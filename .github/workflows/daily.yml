name: AiPulse Daily

on:
  schedule:
    # 22:00 UTC, Mon–Fri (after the U.S. close; GitHub cron is UTC and may be delayed a few min)
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: aipulse-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data (FMP)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python src/fetch_data.py

      - name: Generate report model (Claude)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIPULSE_MODEL: claude-haiku-4-5
        run: python src/generate.py

      - name: Render HTML
        run: python src/render.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
